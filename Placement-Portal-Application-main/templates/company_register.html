{% extends "base.html" %}

{% block title %}Company Registration{% endblock %}

{% block content %}

<h2>Company Registration</h2>

<div class="row">
<div class="col-md-6">

<form method="POST">

    <div class="mb-3">
        <label>Company Name</label>
        <input type="text" name="name" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Official Email</label>
        <input type="email" name="email" class="form-control" required placeholder="hr@company.com">
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required minlength="6">
        <p>Minimum 6 characters</p>
    </div>

    <div class="mb-3">
        <label>Website URL</label>
        <input type="text" name="website" class="form-control" required placeholder="https://example.com">
    </div>

    <div class="mb-3">
        <label>HR Contact Person</label>
        <input type="text" name="hr_contact" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">
        Register Company
    </button>

</form>

<div class="mt-3">
    <p>Account requires admin approval before login.</p>

    <p>
        Already registered?
        <a href="{{ url_for('auth.login', role='company') }}">Login here</a>
    </p>
</div>

</div>
</div>

{% endblock %}
