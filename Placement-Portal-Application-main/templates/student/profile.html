{% extends "base.html" %}

{% block title %}My Profile{% endblock %}

{% block content %}

<div class="row">
    <div class="col-md-8">

        <div class="card">

            <div class="card-header">
                <h4>Edit Profile</h4>
                <a href="{{ url_for('student_dashboard') }}" class="btn btn-secondary">
                    Back
                </a>
            </div>

            <div class="card-body">

                <form method="POST" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label>Full Name</label>
                        <input type="text" name="name" class="form-control"
                               value="{{ student.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label>Email Address</label>
                        <input type="email" class="form-control"
                               value="{{ student.email }}" disabled>
                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label>Department</label>
                            <input type="text" name="department"
                                   class="form-control"
                                   value="{{ student.department }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>CGPA</label>
                            <input type="number"
                                   step="0.01"
                                   name="cgpa"
                                   class="form-control"
                                   value="{{ student.cgpa }}"
                                   min="0"
                                   max="10">
                        </div>

                    </div>

                    <div class="mb-3">
                        <label>Resume</label>

                        {% if student.resume %}
                        <div class="mb-2">
                            <a href="{{ url_for('static', filename='uploads/resumes/' + student.resume) }}"
                               class="btn btn-primary"
                               target="_blank">
                                View Current Resume ({{ student.resume }})
                            </a>
                        </div>
                        {% else %}
                        <div class="mb-2">
                            No resume uploaded.
                        </div>
                        {% endif %}

                        <input type="file" name="resume" class="form-control">

                        <p>Upload new file to replace current resume.</p>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Save Changes
                    </button>

                </form>

            </div>

        </div>

    </div>
</div>

{% endblock %}
