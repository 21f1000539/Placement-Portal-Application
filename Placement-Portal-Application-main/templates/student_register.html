{% extends "base.html" %}

{% block title %}Student Register{% endblock %}

{% block content %}

<div class="row">
<div class="col-md-6">

<div class="card">

<div class="card-header">
<h3>Student Registration</h3>
</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label>Full Name</label>
<input type="text" name="name" class="form-control" required>
</div>

<div class="mb-3">
<label>Email Address</label>
<input type="email" name="email" class="form-control" required placeholder="example@student.com">
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" required minlength="6">
<p>Minimum 6 characters</p>
</div>

<div class="row">

<div class="col-md-6 mb-3">
<label>Department</label>
<input type="text" name="department" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>CGPA</label>
<input type="number" step="0.01" name="cgpa" class="form-control" min="0" max="10">
</div>

</div>

<div class="mb-3">
<label>Upload Resume (PDF/Doc)</label>
<input type="file" name="resume" class="form-control">
</div>

<button type="submit" class="btn btn-primary">
Create Account
</button>

</form>

</div>

<div class="card-footer">

<p>
Already registered?
<a href="{{ url_for('auth.login', role='student') }}">Login here</a>
</p>

</div>

</div>

</div>
</div>

{% endblock %}
